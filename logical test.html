<!DOCTYPE html>
<html>
<head>
<title>Logical Reasoning Test</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  min-height: 100vh;
  margin: 0;
}
.container {
  width: 60%;
  margin: auto;
  background: white;
  padding: 20px;
  margin-top: 40px;
  border-radius: 10px;
  box-shadow: 0 0 10px gray;
}
h1 { text-align: center; }
button {
  padding: 10px 20px;
  background: #007BFF;
  color: white;
  border: none;
  border-radius: 5px;
  font-size: 16px;
  cursor: pointer;
}
button:hover { background: #0056b3; }
.result { font-size: 20px; margin-top: 20px; font-weight: bold; }
</style>
</head>
<body>
<div class="container">
  <h1>Logical Reasoning Test</h1>
  <form id="quizForm"></form>
  <button type="button" onclick="checkAnswers()">Submit Test</button>
  <p id="result" class="result"></p>
</div>
<br>
<button onclick="window.location.href='dashboard.html'">Back to Dashboard</button>

<script>
const logicalQuestions = [
  {question:"Find odd one out: Apple, Mango, Banana, Carrot", options:["Apple","Mango","Banana","Carrot"], answer:"Carrot"},
  {question:"2,6,7,21,22,66 — next?", options:["67","68","69","70"], answer:"67"},
  {question:"Dog: Bark :: Cat: ?", options:["Meow","Roar","Cry","Growl"], answer:"Meow"},
  {question:"If CAT=24 DOG=26 then BAT=?", options:["21","22","23","24"], answer:"21"},
  {question:"Find missing: 3,9,27,?", options:["54","72","81","90"], answer:"81"},
  {question:"Direction opposite of North-East?", options:["South-West","North-West","South-East","East"], answer:"South-West"},
  {question:"Odd one out: 2,3,5,7,9", options:["2","3","7","9"], answer:"9"},
  {question:"Mirror of LEFT?", options:["TFEL","LEFT","LFFT","EFTR"], answer:"TFEL"},
  {question:"Next: 5,10,20,40 ?", options:["60","70","80","90"], answer:"80"},
  {question:"Bird: Fly :: Fish: ?", options:["Swim","Walk","Run","Jump"], answer:"Swim"},
  {question:"Sun rises in?", options:["North","South","East","West"], answer:"East"},
  {question:"Odd: Car, Bus, Train, Banana", options:["Car","Bus","Train","Banana"], answer:"Banana"},
  {question:"Next: 1,4,9,16 ?", options:["20","22","25","30"], answer:"25"},
  {question:"Clock angle at 3:00?", options:["90","60","120","180"], answer:"90"},
  {question:"Complete: A,B,C,?,E", options:["D","F","G","H"], answer:"D"},
  {question:"Next: 7,14,21 ?", options:["24","28","30","32"], answer:"28"},
  {question:"Opposite of UP?", options:["Down","Left","Right","Front"], answer:"Down"},
  {question:"Odd: Red, Blue, Green, Dog", options:["Red","Blue","Green","Dog"], answer:"Dog"},
  {question:"2,4,8,16 next?", options:["20","24","30","32"], answer:"32"},
  {question:"Day after Monday?", options:["Tuesday","Wednesday","Thursday","Sunday"], answer:"Tuesday"},
  {question:"Mirror of 123?", options:["321","123","231","213"], answer:"321"},
  {question:"Next: 10,20,30 ?", options:["35","40","45","50"], answer:"40"},
  {question:"Alphabet after M?", options:["L","N","O","P"], answer:"N"},
  {question:"Even number?", options:["5","7","8","9"], answer:"8"},
  {question:"Next: 4,16,64 ?", options:["128","192","256","300"], answer:"256"},
  {question:"Odd: Tiger, Lion, Cow, Apple", options:["Tiger","Lion","Cow","Apple"], answer:"Apple"},
  {question:"Next: 1,3,5,7 ?", options:["8","9","10","11"], answer:"9"},
  {question:"Opposite of Hot?", options:["Cold","Warm","Heat","Cool"], answer:"Cold"},
  {question:"Triangle sides?", options:["2","3","4","5"], answer:"3"},
  {question:"Next: 6,12,18 ?", options:["20","22","24","30"], answer:"24"}
];

let selectedQuestions = [];

function loadQuiz(questions) {
  selectedQuestions = questions.sort(() => 0.5 - Math.random()).slice(0, 10);
  const form = document.getElementById("quizForm");
  selectedQuestions.forEach((q, index) => {
    let html = `<p>${index + 1}. ${q.question}</p>`;
    q.options.forEach(opt => {
      html += `<input type="radio" name="q${index}" value="${opt}"> ${opt}<br>`;
    });
    form.innerHTML += html + "<br>";
  });
}

async function checkAnswers() {
  let score = 0;
  selectedQuestions.forEach((q, index) => {
    const ans = document.querySelector(`input[name="q${index}"]:checked`);
    if (ans && ans.value === q.answer) score++;
  });

  document.getElementById("result").innerHTML = `Your Score: ${score} / 10`;

  const userId = sessionStorage.getItem('userId');
  if (userId) {
    try {
      await fetch('http://localhost:3000/api/results', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, testType: 'Logical Reasoning Test', score, total: 10 })
      });
    } catch (err) {
      console.warn('Could not save result to server.');
    }
  }
}

loadQuiz(logicalQuestions);
</script>
</body>
</html>
